<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{min-height:100vh;min-height:100dvh;background:#1a1a1a;font-family:'Chakra Petch',sans-serif;color:#c8c8c0;padding:10px;overflow-x:hidden}
button{touch-action:manipulation;user-select:none;-webkit-user-select:none;cursor:pointer;font-family:'Chakra Petch',sans-serif}
input[type=range]{touch-action:manipulation;width:100%;height:20px;cursor:pointer;-webkit-appearance:none;appearance:none;background:transparent;outline:none}
input[type=range]::-webkit-slider-runnable-track{height:4px;background:linear-gradient(90deg,#2a2a28,#3a3a36);border-radius:2px;border:1px solid #111}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:linear-gradient(145deg,#666,#444);border:2px solid #222;margin-top:-9px;box-shadow:0 1px 3px #0008}
input[type=number]{background:#0a0a08;border:1px solid #333;color:#d4e84e;border-radius:2px;padding:4px 6px;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;text-align:center;width:100%;-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]:focus{outline:none;border-color:#d4e84e}

/* Wrap */
.wrap{max-width:400px;margin:0 auto}
#panelsWrap{display:flex;flex-direction:column;gap:8px}

/* Header - brand strip */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:6px 10px;
  background:linear-gradient(180deg,#2c2c2a,#222220);border:1px solid #3a3a38;border-radius:4px;
  box-shadow:0 2px 8px #0006}
.hdr .brand{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:#b8b8b0;letter-spacing:.12em;text-transform:uppercase}
.hdr .brand em{color:#d4e84e;font-style:normal}
.hdr-btns{display:flex;gap:4px}
.hdr-btn{background:linear-gradient(180deg,#3a3a38,#2a2a28);border:1px solid #444;color:#888;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.04em}
.hdr-btn:active{background:#222}

/* Enclosure panel */
.enc{
  background:linear-gradient(170deg,#2e2e2c 0%,#262624 40%,#222220 100%);
  border:1px solid #3a3a38;border-radius:6px;padding:14px 12px;margin-bottom:8px;
  box-shadow:0 3px 12px #0008,inset 0 1px 0 #ffffff08;
  position:relative;
}
/* Corner screws */
.enc::before,.enc::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#555,#333 60%,#222);border:1px solid #1a1a1a;
  box-shadow:inset 0 1px 2px #0006}
.enc::before{top:6px;right:6px}
.enc::after{bottom:6px;left:6px}

/* Section label - embossed */
.slbl{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#5a5a54;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;text-shadow:0 1px 0 #0008}

/* LED indicator */
.led{width:7px;height:7px;border-radius:50%;background:#1a1a18;border:1px solid #333;flex-shrink:0;
  box-shadow:inset 0 1px 2px #0004}
.led.g{background:radial-gradient(circle at 40% 35%,#7fff7f,#22cc22 60%,#118811);box-shadow:0 0 6px #22cc2288}
.led.a{background:radial-gradient(circle at 40% 35%,#ffcc44,#cc8800 60%,#885500);box-shadow:0 0 6px #cc880088}

/* LCD screen */
.lcd{background:#0a0c06;border:2px solid #333;border-radius:3px;padding:8px;margin-bottom:8px;
  box-shadow:inset 0 2px 8px #000a,0 1px 0 #ffffff08;position:relative;overflow:hidden}
.lcd::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,#0001 2px,#0001 4px);pointer-events:none;opacity:.3}

/* LCD text */
.lcd-note{font-family:'Orbitron',monospace;font-size:42px;font-weight:900;text-align:center;line-height:1;
  color:#1a1c12;transition:color .12s;letter-spacing:.04em}
.lcd-note.on{color:#d4e84e;text-shadow:0 0 12px #d4e84e44}
.lcd-note.ok{color:#44ee44;text-shadow:0 0 16px #44ee4444}
.lcd-oct{font-family:'Orbitron',monospace;font-size:16px;color:#555;vertical-align:super;margin-left:2px}
.lcd-oct.on{color:#8a8a40}
.lcd-inf{font-family:'Orbitron',monospace;font-size:10px;text-align:center;color:#3a3a30;margin-top:4px;font-weight:600;letter-spacing:.06em}
.lcd-inf .ok{color:#44ee44}.lcd-inf .sh{color:#ee8844}

.lcd-bpm{font-family:'Orbitron',monospace;font-size:38px;font-weight:900;text-align:center;line-height:1;
  color:#555;letter-spacing:.06em}
.lcd-bpm.on{color:#d4e84e;text-shadow:0 0 12px #d4e84e44}
.lcd-bpm-u{font-family:'Orbitron',monospace;font-size:9px;color:#4a4a40;text-align:center;margin-top:2px;letter-spacing:.15em}

/* Stomp button */
.stomp{
  display:block;width:100%;padding:10px 0;border:none;border-radius:4px;font-size:12px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;transition:all .08s;
  background:linear-gradient(180deg,#444 0%,#333 40%,#2a2a2a 100%);
  color:#999;border-top:2px solid #555;border-bottom:2px solid #111;
  box-shadow:0 3px 6px #0008,inset 0 1px 0 #ffffff10;
  text-shadow:0 1px 2px #000;
}
.stomp:active{transform:translateY(1px);box-shadow:0 1px 3px #0006;border-top-color:#444;border-bottom-color:#222}
.stomp.active-g{background:linear-gradient(180deg,#1a4a1a,#143814);color:#44ee44;border-top-color:#2a6a2a;text-shadow:0 0 8px #44ee4444}
.stomp.active-a{background:linear-gradient(180deg,#4a3a1a,#382c14);color:#eea844;border-top-color:#6a5a2a;text-shadow:0 0 8px #eea84444}

/* Small controls */
.ctrl-row{display:flex;gap:6px;margin-top:8px}
.sm-btn{padding:4px 8px;border-radius:3px;font-size:11px;font-weight:700;
  background:linear-gradient(180deg,#3a3a38,#2a2a28);border:1px solid #444;color:#777;
  letter-spacing:.04em;transition:all .1s}
.sm-btn:active{background:#222}
.sm-btn.sel{color:#d4e84e;border-color:#6a6a20;background:linear-gradient(180deg,#333320,#2a2a18)}

/* Beats row */
.beats{display:flex;gap:5px;justify-content:center;align-items:center;margin:8px 0;flex-wrap:wrap}
.bd{border-radius:50%;cursor:pointer;transition:all .06s;position:relative;display:flex;align-items:center;justify-content:center;
  border:2px solid #333;background:#1a1a18}
.bd .x{position:absolute;font-size:7px;font-weight:800;color:#ee4444;opacity:0;transition:opacity .1s}
.bd.muted .x{opacity:1}

/* Volume */
.vol-row{display:flex;align-items:center;gap:6px;margin-top:8px;padding:0 2px}
.vol-row span{font-size:9px;color:#555;white-space:nowrap;font-weight:600}

/* Ref row */
.ref-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.ref-row span{font-size:9px;color:#555;font-weight:600}
.ref-row input{width:56px;font-size:11px;padding:3px}

.mute-tip{text-align:center;font-size:8px;color:#444;margin-bottom:4px;font-weight:600;letter-spacing:.06em}
.footer{text-align:center;margin-top:12px;padding-bottom:16px;font-size:8px;color:#333;letter-spacing:.1em;font-weight:600}
.footer a{color:#555;text-decoration:none;margin:0 6px}.footer a:hover{color:#999}

/* Inline help text within panels */
.inline-help{margin-top:10px;padding-top:8px;border-top:1px solid #2a2a28;
  font-size:9.5px;color:#555;line-height:1.7;font-weight:500}
.inline-help p{margin:0 0 4px}
.inline-help em{color:#9a9a60;font-style:normal}
.pc-only{display:none}
@media(min-width:720px){.pc-only{display:block}}
/* ═══ PC Layout ═══ */
@media(min-width:760px){
  body{padding:20px 24px;display:flex;justify-content:center;align-items:flex-start;min-height:100vh}
  .wrap{max-width:860px;width:100%}
  .hdr{padding:10px 16px;margin-bottom:12px;border-radius:6px}
  .hdr .brand{font-size:18px;letter-spacing:.14em}
  .hdr-btn{font-size:12px;padding:5px 12px;border-radius:4px}
  #swapBtn{display:none}
  #panelsWrap{flex-direction:row;gap:12px;align-items:stretch}
  #panelsWrap>.enc{flex:1;min-width:0;margin-bottom:0;display:flex;flex-direction:column}
  .enc{padding:20px 18px;border-radius:8px}
  #tunerPanel .stomp{margin-top:auto}
  #tunerPanel .ref-row{margin-top:12px}
  .slbl{font-size:10px;margin-bottom:12px;letter-spacing:.2em}
  .led{width:8px;height:8px}
  .lcd{padding:12px;margin-bottom:10px;border-radius:4px}
  .lcd-note{font-size:52px}
  .lcd-oct{font-size:18px}
  .lcd-inf{font-size:11px;margin-top:6px}
  .lcd-bpm-u{font-size:10px}
  #bpmIn{font-size:42px!important;width:110px!important}
  .stomp{padding:12px 0;font-size:13px;border-radius:5px}
  .sm-btn{padding:6px 12px;font-size:12px}
  .ref-row{margin-top:12px}
  .ref-row span{font-size:11px}
  .ref-row input{width:64px;font-size:13px;padding:4px}
  .vol-row{margin-top:10px}
  .vol-row span{font-size:10px}
  .mute-tip{font-size:9px}
  .beats{gap:6px;margin:10px 0}
  .ctrl-row{gap:8px;margin-top:10px}
  .inline-help{font-size:10px;margin-top:14px;padding-top:10px}
  .footer{margin-top:16px;font-size:9px}
  #gauge{max-width:280px}
  .bd{width:22px!important;height:22px!important}
  .bd .x{font-size:8px}
}
/* ═══ Wide PC Layout ═══ */
@media(min-width:1100px){
  .wrap{max-width:960px}
  .enc{padding:24px 22px}
  .lcd-note{font-size:56px}
  #bpmIn{font-size:46px!important;width:120px!important}
  #gauge{max-width:320px}
  .stomp{padding:14px 0;font-size:14px}
}
</style>
</head>
<body>
<div class="wrap">
  <!-- HEADER -->
  <div class="hdr">
    <div class="brand"><em>◆</em> TUNEBEAT</div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="swapBtn">⇅</button>
      <button class="hdr-btn" id="langBtn">日本語</button>
    </div>
  </div>

  <div id="panelsWrap">
  <!-- TUNER -->
  <div class="enc" id="tunerPanel">
    <div class="slbl"><span class="led" id="tDot"></span><span id="tLbl">TUNER</span></div>
    <div class="lcd">
      <div style="text-align:center">
        <span class="lcd-note" id="nN">—</span><span class="lcd-oct" id="nO"></span>
      </div>
      <div class="lcd-inf" id="tInf">— CENTS &nbsp;|&nbsp; — HZ</div>
    </div>
    <svg id="gauge" viewBox="0 0 200 120" style="width:100%;max-width:240px;display:block;margin:0 auto 8px;pointer-events:none"></svg>
    <button class="stomp" id="tBtn">● START</button>
    <div class="ref-row">
      <span>A4 =</span>
      <input type="number" id="refHz" value="440" min="420" max="460" step="1">
      <span>Hz</span>
    </div>
    <div class="inline-help pc-only" id="tunerHelp"></div>
  </div>

  <!-- METRONOME -->
  <div class="enc" id="metPanel">
    <div class="slbl"><span class="led" id="mDot"></span><span id="mLbl">METRONOME</span></div>
    <div class="lcd">
      <div style="display:flex;align-items:baseline;justify-content:center">
        <input type="number" id="bpmIn" value="120" min="20" max="300"
          style="width:90px;font-size:34px;background:transparent;border:none;color:#555;text-align:center;padding:0">
      </div>
      <div class="lcd-bpm-u">BPM</div>
    </div>
    <div style="padding:0 2px;margin-bottom:10px">
      <input type="range" id="bpmSl" min="20" max="300" value="120">
    </div>
    <div style="display:flex;gap:4px;justify-content:center;margin-bottom:8px;flex-wrap:wrap" id="tsRow"></div>
    <div class="beats" id="btsRow"></div>
    <div class="mute-tip" id="muteTip"></div>
    <div class="ctrl-row">
      <button class="stomp" id="mBtn" style="flex:2">▶ START</button>
      <button class="stomp" id="tapBtn" style="flex:1">♩ TAP</button>
    </div>
    <div class="vol-row">
      <span id="volLbl">VOL</span>
      <input type="range" id="volSl" min="0" max="100" value="80">
      <span id="volVal" style="width:24px;text-align:right">80</span>
    </div>

    <div class="inline-help" id="metHelp"></div>
  </div>
  </div><!-- /panelsWrap -->

  <div class="footer">
    TUNEBEAT — FREE ONLINE TUNER & METRONOME v2
    <br><a href="/about.html">About</a>|<a href="/privacy.html">Privacy Policy</a>
  </div>
</div><!-- /wrap -->

<script>
// ═══ localStorage ═══
const LS_KEY='tunebeat_prefs';
function loadPrefs(){try{const s=localStorage.getItem(LS_KEY);return s?JSON.parse(s):null;}catch(e){return null;}}
function savePrefs(){try{localStorage.setItem(LS_KEY,JSON.stringify({lang,bpm,tsNum,tsDen,customTs,vol,refHz,metFirst}));}catch(e){}}
const saved=loadPrefs();

// ═══ State ═══
let lang=saved?.lang||((navigator.language||'').startsWith('ja')?'ja':'en');
let tunerOn=false,tCtx=null,tStr=null,tRaf=null,refHz=saved?.refHz||440;
let nd={name:'—',oct:'',cents:0,freq:0};
let bpm=saved?.bpm||120,tsNum=saved?.tsNum||4,tsDen=saved?.tsDen||4,customTs=saved?.customTs||false,metOn=false,aBeat=-1;
let mCtx=null,mTimer=null,mNext=0,mBeat=0,mPlay=false;
let vol=saved?.vol??0.8,mutedBeats=new Set();
let metFirst=saved?.metFirst||false;
const taps=[];
const presets=[[2,4],[3,4],[4,4],[5,4],[6,8],[7,8]];

// ═══ i18n ═══
const TT={
  en:{tuner:'TUNER',met:'METRONOME',start:'START',stop:'STOP',tap:'TAP',
      muteTip:'Tap a beat to mute/unmute',vol:'VOL'},
  ja:{tuner:'チューナー',met:'メトロノーム',start:'スタート',stop:'ストップ',tap:'タップ',
      muteTip:'各拍タップでミュート切替',vol:'音量'}
};
const t=()=>TT[lang];

function renderHelp(){
  if(lang==='ja'){
    $('tunerHelp').innerHTML=
      '<p>A4基準音は420〜460Hzで調整可能。オーディオインターフェース経由のギター直入力にも対応しています。</p>';
    $('metHelp').innerHTML=
      '<p>BPMは数値の直接入力かスライダーで設定。各拍の丸をタップするとミュートでき、音は消えますが枠は光り続けます。<em>TAP</em> を曲に合わせて叩くとBPMを自動算出します。</p>';
  }else{
    $('tunerHelp').innerHTML=
      '<p>The A4 reference pitch can be adjusted between 420–460 Hz. Direct guitar input through an audio interface is also supported.</p>';
    $('metHelp').innerHTML=
      '<p>Set BPM by typing a number or using the slider. Tap any beat dot to mute it — the click is silenced but the border still lights up. Hit <em>TAP</em> along with a song to auto-calculate tempo.</p>';
  }
}

// ═══ Pitch Detection ═══
function autoCorr(buf,sr){
  let S=buf.length,rms=0;for(let i=0;i<S;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/S);
  if(rms<0.01)return -1;let r1=0,r2=S-1;
  for(let i=0;i<S/2;i++){if(Math.abs(buf[i])<0.2){r1=i;break;}}
  for(let i=1;i<S/2;i++){if(Math.abs(buf[S-i])<0.2){r2=S-i;break;}}
  buf=buf.slice(r1,r2);S=buf.length;if(S<2)return -1;
  const c=new Array(S).fill(0);for(let i=0;i<S;i++)for(let j=0;j<S-i;j++)c[i]+=buf[j]*buf[j+i];
  let d=0;while(d<S-1&&c[d]>c[d+1])d++;
  let mx=-1,mp=-1;for(let i=d;i<S;i++){if(c[i]>mx){mx=c[i];mp=i;}}
  if(mp<1||mp>=S-1)return -1;
  let T0=mp;const x1=c[T0-1],x2=c[T0],x3=c[T0+1],a=(x1+x3-2*x2)/2,b=(x3-x1)/2;
  if(a)T0-=b/(2*a);return sr/T0;
}
const NOTES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function f2n(f){
  const n=12*Math.log2(f/refHz),r=Math.round(n),cents=Math.floor((n-r)*100);
  return{name:NOTES[((r%12)+12+9)%12],oct:Math.floor((r+69)/12)-1,cents,freq:f};
}

// ═══ Gauge ═══
function drawG(){
  const svg=$('gauge'),c=nd.cents,act=tunerOn;
  const rot=act?Math.max(-45,Math.min(45,c*0.9)):0;
  const ok=act&&Math.abs(c)<5;
  const R=80,cx=100,cy=100;
  const a2xy=(deg)=>{const r=(deg-90)*Math.PI/180;return[cx+R*Math.cos(r),cy+R*Math.sin(r)];};
  const[lx,ly]=a2xy(-45),[rx,ry]=a2xy(45),[ml1x,ml1y]=a2xy(-8),[mr1x,mr1y]=a2xy(8);
  let h='';
  h+=`<path d="M ${lx} ${ly} A ${R} ${R} 0 0 1 ${rx} ${ry}" fill="none" stroke="#1a1a18" stroke-width="24"/>`;
  h+=`<path d="M ${lx} ${ly} A ${R} ${R} 0 0 1 ${ml1x} ${ml1y}" fill="none" stroke="rgba(200,60,40,0.25)" stroke-width="20"/>`;
  h+=`<path d="M ${ml1x} ${ml1y} A ${R} ${R} 0 0 1 ${mr1x} ${mr1y}" fill="none" stroke="rgba(68,238,68,0.2)" stroke-width="20"/>`;
  h+=`<path d="M ${mr1x} ${mr1y} A ${R} ${R} 0 0 1 ${rx} ${ry}" fill="none" stroke="rgba(200,60,40,0.25)" stroke-width="20"/>`;
  for(let i=-45;i<=45;i+=5){
    const maj=i%15===0,c0=i===0,rad=(i-90)*Math.PI/180,r1=maj?80:84;
    const col=c0?'#44ee44':maj?'#666':'#3a3a38',sw=c0?2.5:maj?1.5:0.8;
    h+=`<line x1="${cx+r1*Math.cos(rad)}" y1="${cy+r1*Math.sin(rad)}" x2="${cx+92*Math.cos(rad)}" y2="${cy+92*Math.sin(rad)}" stroke="${col}" stroke-width="${sw}"/>`;
  }
  const nr=(rot-90)*Math.PI/180,nc=ok?'#44ee44':act?'#ee8844':'#3a3a38';
  h+=`<line x1="${cx}" y1="${cy}" x2="${cx+72*Math.cos(nr)}" y2="${cy+72*Math.sin(nr)}" stroke="${nc}" stroke-width="2" stroke-linecap="round" style="transition:all .08s ease-out;${ok?'filter:drop-shadow(0 0 4px #44ee44)':''}"/>`;
  h+=`<circle cx="${cx}" cy="${cy}" r="4" fill="${ok?'#44ee44':'#555'}"/>`;
  h+=`<text x="${lx-6}" y="${ly+12}" fill="#555" font-size="9" font-family="'Chakra Petch',sans-serif" font-weight="700" text-anchor="middle">♭</text>`;
  h+=`<text x="${rx+6}" y="${ry+12}" fill="#555" font-size="9" font-family="'Chakra Petch',sans-serif" font-weight="700" text-anchor="middle">♯</text>`;
  svg.innerHTML=h;
}

// ═══ UI ═══
const $=id=>document.getElementById(id);
function uTuner(){
  const ok=tunerOn&&Math.abs(nd.cents)<5;
  const nn=$('nN');nn.textContent=nd.name;nn.className='lcd-note'+(tunerOn?(ok?' ok':' on'):'');
  const no=$('nO');no.textContent=nd.oct;no.className='lcd-oct'+(tunerOn?' on':'');
  if(tunerOn){
    const cc=ok?'ok':'sh';
    $('tInf').innerHTML=`<span class="${cc}">${nd.cents>0?'+':''}${nd.cents} CENTS</span> &nbsp;|&nbsp; ${nd.freq.toFixed(1)} HZ`;
  }else $('tInf').innerHTML='— CENTS &nbsp;|&nbsp; — HZ';
  drawG();
  $('tDot').className='led'+(tunerOn?' g':'');
  $('tBtn').textContent=(tunerOn?'■  ':'● ')+t()[tunerOn?'stop':'start'];
  $('tBtn').className='stomp'+(tunerOn?' active-g':'');
}
function uMet(){
  const bi=$('bpmIn');bi.value=bpm;bi.style.color=metOn?'#d4e84e':'#555';
  $('bpmSl').value=bpm;
  $('mDot').className='led'+(metOn?' a':'');
  $('mBtn').textContent=(metOn?'■  ':'▶ ')+t()[metOn?'stop':'start'];
  $('mBtn').className='stomp'+(metOn?' active-a':'');
  let th='';
  presets.forEach(([n,d])=>{
    const sel=!customTs&&tsNum===n&&tsDen===d;
    th+=`<button class="sm-btn${sel?' sel':''}" data-pn="${n}" data-pd="${d}">${n}/${d}</button>`;
  });
  $('tsRow').innerHTML=th;
  let bh='';
  const sz=18;
  for(let i=0;i<tsNum;i++){
    const isAct=metOn&&aBeat===i,isMu=mutedBeats.has(i);
    const isFirst=i===0;
    // Colors: active glow on border even when muted
    let bg,bdr,sh,op;
    if(isAct){
      bdr=isFirst?'#eea844':'#44ee44';
      sh=`0 0 8px ${isFirst?'#eea84466':'#44ee4466'}`;
      bg=isMu?'#1a1a18':(isFirst?'#eea844':'#44ee44');
      op=isMu?'0.6':'1';
    }else{
      bg='#1a1a18';
      bdr=isFirst?'#665520':'#336633';
      sh='none';
      op=isMu?'0.35':'1';
    }
    bh+=`<div class="bd${isMu?' muted':''}" data-bi="${i}" style="width:${sz}px;height:${sz}px;background:${bg};border-color:${bdr};box-shadow:${sh};opacity:${op}"><span class="x">✕</span></div>`;
  }
  $('btsRow').innerHTML=bh;
  $('muteTip').textContent=t().muteTip;
  $('volVal').textContent=Math.round(vol*100);
}
function uLang(){
  document.documentElement.lang=lang;
  $('langBtn').textContent=lang==='ja'?'EN':'日本語';
  $('tLbl').textContent=t().tuner;$('mLbl').textContent=t().met;
  $('tapBtn').innerHTML='♩ '+t().tap;$('volLbl').textContent=t().vol;
  renderHelp();uTuner();uMet();
}

// ═══ Tuner ═══
async function startT(){
  try{const s=await navigator.mediaDevices.getUserMedia({audio:true});tStr=s;
    tCtx=new(window.AudioContext||window.webkitAudioContext)();
    const src=tCtx.createMediaStreamSource(s),an=tCtx.createAnalyser();an.fftSize=4096;src.connect(an);
    tunerOn=true;uTuner();const buf=new Float32Array(an.fftSize);
    const loop=()=>{an.getFloatTimeDomainData(buf);const f=autoCorr(buf,tCtx.sampleRate);if(f>0&&f<5000)nd=f2n(f);uTuner();tRaf=requestAnimationFrame(loop);};loop();
  }catch(e){console.error(e);}
}
function stopT(){tunerOn=false;if(tRaf)cancelAnimationFrame(tRaf);if(tStr)tStr.getTracks().forEach(t=>t.stop());if(tCtx)tCtx.close();tCtx=null;nd={name:'—',oct:'',cents:0,freq:0};uTuner();}

// ═══ Metronome ═══
function click(time,beat){if(!mCtx||mutedBeats.has(beat))return;
  const osc=mCtx.createOscillator(),g=mCtx.createGain();osc.connect(g);g.connect(mCtx.destination);
  osc.frequency.value=beat===0?1200:800;const v=beat===0?vol:vol*0.5;
  g.gain.setValueAtTime(v,time);g.gain.exponentialRampToValueAtTime(0.001,time+0.08);osc.start(time);osc.stop(time+0.08);}
function mSched(){if(!mPlay||!mCtx)return;
  while(mNext<mCtx.currentTime+0.15){click(mNext,mBeat);aBeat=mBeat;uMet();mNext+=60/bpm;mBeat=(mBeat+1)%tsNum;}
  mTimer=setTimeout(mSched,20);}
function startMet(){if(!mCtx)mCtx=new(window.AudioContext||window.webkitAudioContext)();if(mCtx.state==='suspended')mCtx.resume();mBeat=0;mNext=mCtx.currentTime+0.05;mPlay=true;metOn=true;mSched();uMet();}
function stopMet(){mPlay=false;metOn=false;aBeat=-1;if(mTimer){clearTimeout(mTimer);mTimer=null;}uMet();}
function togMet(){if(metOn)stopMet();else startMet();}
function restartMet(){if(metOn){stopMet();startMet();}}

// ═══ Events ═══
$('tBtn').onclick=()=>{if(tunerOn)stopT();else startT();};
$('mBtn').onclick=togMet;
$('tapBtn').onclick=()=>{const now=Date.now();taps.push(now);if(taps.length>5)taps.shift();
  if(taps.length>=2){const iv=[];for(let i=1;i<taps.length;i++){const d=taps[i]-taps[i-1];if(d<2000)iv.push(d);}
  if(iv.length){const avg=iv.reduce((a,b)=>a+b,0)/iv.length;const n=Math.round(60000/avg);if(n>=20&&n<=300){bpm=n;restartMet();uMet();savePrefs();}}}};
$('tsRow').addEventListener('click',e=>{const b=e.target;if(b.dataset.pn){tsNum=+b.dataset.pn;tsDen=+b.dataset.pd;customTs=false;mutedBeats.clear();restartMet();uMet();savePrefs();}});
$('btsRow').addEventListener('click',e=>{const bd=e.target.closest('.bd');if(!bd)return;const i=+bd.dataset.bi;if(mutedBeats.has(i))mutedBeats.delete(i);else mutedBeats.add(i);uMet();});

// ═══ Panel Swap ═══
function applyOrder(){const w=$('panelsWrap'),tp=$('tunerPanel'),mp=$('metPanel');if(metFirst)w.insertBefore(mp,w.firstChild);else w.insertBefore(tp,w.firstChild);}
$('swapBtn').onclick=()=>{metFirst=!metFirst;applyOrder();savePrefs();};

// ═══ Save on changes ═══
$('langBtn').onclick=()=>{lang=lang==='en'?'ja':'en';uLang();savePrefs();};
$('bpmSl').oninput=e=>{bpm=+e.target.value;$('bpmIn').value=bpm;restartMet();savePrefs();};
$('bpmIn').onchange=e=>{let v=Math.max(20,Math.min(300,+e.target.value));bpm=v;$('bpmSl').value=v;restartMet();uMet();savePrefs();};
$('refHz').onchange=e=>{refHz=Math.max(420,Math.min(460,+e.target.value));$('refHz').value=refHz;savePrefs();};
$('volSl').oninput=e=>{vol=+e.target.value/100;$('volVal').textContent=Math.round(vol*100);savePrefs();};

// ═══ Init ═══
$('refHz').value=refHz;$('bpmIn').value=bpm;$('bpmSl').value=bpm;
$('volSl').value=Math.round(vol*100);$('volVal').textContent=Math.round(vol*100);
applyOrder();drawG();uLang();
</script>
</body>
